version: 2

project_name: arcvault

before:
  hooks:
    - npm run build --prefix dashboard
    - cmd /c xcopy /E /I /Y dashboard\dist coordinator\static\dist

builds:
  - id: coordinator
    main: ./coordinator
    binary: coordinator
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}}
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: agent
    main: ./agent
    binary: agent
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: coordinator-archive
    ids:
      - coordinator
    name_template: "coordinator_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

  - id: agent-archive
    ids:
      - agent
    name_template: "agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - agent-config.yaml
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true
  replace_existing_draft: true
